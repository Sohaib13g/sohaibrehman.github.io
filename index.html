<!DOCTYPE html>
<html>
<head>
  <title>Animated Background</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: linear-gradient(-45deg, #000000, #111111, #d4af37, #000000);
      background-size: 400% 400%;
      animation: moveBG 8s ease infinite;
      color: white;
      font-family: Arial;
    }

    @keyframes moveBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .text {
      text-align: center;
      margin-top: 20%;
      font-size: 40px;
    }
  </style>
</head>

<body>

  <div class="text">
    Trade With Sohaib 🚀
  </div>

</body><meta name="viewport" content="width=device-width, initial-scale=1.0">
</html>
